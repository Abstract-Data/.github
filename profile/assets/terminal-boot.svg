<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Data terminal boot sequence</title>
  <desc id="desc">Animated terminal-style loading sequence describing Abstract Data system initialization.</desc>
  <defs>
    <style>
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .terminal-bg {
        stroke-width: 2;
      }

      .terminal-bar {
        fill: none;
      }

      .terminal-text {
        font-family: 'Fira Code', monospace;
        font-size: 16px;
        opacity: 0;
      }

      .cursor {
        font-family: 'Fira Code', monospace;
        font-size: 16px;
        animation: blink 1s step-end infinite;
      }

      .terminal-header {
        font-family: 'Fira Code', monospace;
      }

      .line-1 { animation: fadeIn 0.8s ease forwards 0.3s; }
      .line-2 { animation: fadeIn 0.8s ease forwards 1.5s; }
      .line-3 { animation: fadeIn 0.8s ease forwards 2.7s; }
      .line-4 { animation: fadeIn 0.8s ease forwards 3.9s; }

      @media (prefers-color-scheme: dark) {
        .terminal-bg {
          fill: none;
          stroke: #00D9FF;
        }

        .terminal-text {
          fill: #00D9FF;
        }

        .cursor {
          fill: #00D9FF;
        }

        .terminal-header {
          fill: #FFFFFF;
        }
      }

      @media (prefers-color-scheme: light) {
        .terminal-bg {
          fill: none;
          stroke: #0099B3;
        }

        .terminal-text {
          fill: #0099B3;
        }

        .cursor {
          fill: #0099B3;
        }

        .terminal-header {
          fill: #065A6E;
        }
      }
    </style>
  </defs>

  <rect class="terminal-bg" x="0" y="0" width="800" height="400" rx="12" />
  <rect class="terminal-bar" x="0" y="0" width="800" height="32" rx="12 12 0 0" />
  <text class="terminal-header" x="20" y="22" font-family="'Fira Code', monospace" font-size="14">abstract-data@civic-tech:~$</text>

  <g transform="translate(30, 70)">
    <text class="terminal-text line-1" y="0">$ INITIALIZING ABSTRACT DATA SYSTEMS...</text>
    <text class="terminal-text line-2" y="40">✓ Data infrastructure services......... [READY]</text>
    <text class="terminal-text line-3" y="80">✓ Compliance automation modules....... [ACTIVE]</text>
    <text class="terminal-text line-4" y="120">✓ AI quality + validation pipelines... [ONLINE]</text>
    <text class="cursor" y="170">▮</text>
  </g>
</svg>
